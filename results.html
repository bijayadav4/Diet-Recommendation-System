<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results • Diet Recommendation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .results-hero { margin-top: 24px; }
    .bmi-dial { width: 180px; height: 180px; position: relative; margin: 0 auto; }
    .bmi-dial .ring { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#22c55e 0 25%, #eab308 25% 50%, #f59e0b 50% 75%, #ef4444 75% 100%); filter: drop-shadow(0 4px 12px rgba(0,0,0,.12)); }
    .bmi-dial .center { position:absolute; inset: 20px; border-radius: 50%; background: #fff; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    .bmi-dial .needle { position:absolute; inset: 0; display:block; transform: rotate(0deg); transition: transform 800ms ease; }
    .bmi-dial .needle::after { content:''; position:absolute; left:50%; top:10px; transform:translateX(-50%); width:4px; height:70px; background:#334155; border-radius:2px; }

    .accordion-button:not(.collapsed) { background:#f8fafc; }
    .action-bar { gap: .5rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="fa-solid fa-seedling me-2"></i>Diet Recommendation</a>
      <div class="d-flex align-items-center ms-auto">
        <button id="themeToggle" class="btn btn-sm btn-light">
          <i id="themeIcon" class="fa-solid fa-moon"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="container results-hero">
    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card p-4">
          <div class="d-flex align-items-center gap-3 mb-3">
            <img id="resProfileImg" class="rounded" style="width:56px;height:56px;object-fit:cover;border:2px solid #e5e7eb;" alt="Profile"/>
            <div>
              <h5 id="resName" class="mb-0">—</h5>
              <small id="resMeta" class="text-muted">—</small>
            </div>
          </div>
          <div class="bmi-dial my-3">
            <div class="ring"></div>
            <div id="dialNeedle" class="needle"></div>
            <div class="center">
              <div id="bmiValueDial" class="fw-bold" style="font-size:26px">0.0</div>
              <div id="bmiCategoryDial" class="small text-muted">—</div>
            </div>
          </div>
          <div class="mt-3">
            <div class="d-flex justify-content-between"><span>Daily Calories</span><strong id="caloriesNeed">—</strong></div>
            <div class="progress-container"><div class="progress-bar-custom" id="calorieBar" style="width:0%"></div></div>
          </div>
          <div class="mt-3">
            <div class="d-flex justify-content-between"><span>Weight Goal Progress</span></div>
            <div class="progress-container"><div class="progress-bar-custom" id="goalBar" style="width:0%"></div></div>
            <div class="d-flex justify-content-between small"><span>Current: <span id="curW">—</span>kg</span><span>Goal: <span id="goalW">—</span>kg</span></div>
          </div>
          <hr/>
          <div class="mt-2">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <strong>Water Intake</strong>
              <small id="waterCountLabel" class="text-muted">—</small>
            </div>
            <div class="water-grid-small mb-3" id="resWaterTracker">
              </div>
          </div>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card p-4">
          <div class="d-flex justify-content-between action-bar flex-wrap mb-3">
            <div class="d-flex align-items-center gap-3">
              <button class="btn btn-outline-secondary" onclick="window.history.back()"><i class="fa-solid fa-arrow-left me-2"></i>Back</button>
              <h4 class="mb-0">Personalized Meal Plan</h4>
            </div>
            <div class="d-flex gap-2">
              <button id="exportPlanBtn" class="btn btn-primary"><i class="fa-solid fa-download me-2"></i>Export Plan (.txt)</button>
              <button id="savePlanBtn" class="btn btn-outline-secondary"><i class="fa-solid fa-bookmark me-2"></i>Save Plan</button>
              <button id="openGroceryModalBtn" class="btn btn-outline-secondary"><i class="fa-solid fa-cart-shopping me-2"></i>Grocery List</button>
            </div>
          </div>

          <div class="accordion" id="dietPlanAccordion">
            <div class="accordion-item">
              <h2 class="accordion-header">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true">
                  <i class="fas fa-sun me-2 text-warning"></i>Breakfast
                </button>
              </h2>
              <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#dietPlanAccordion">
                <div class="accordion-body"><ul id="resBreakfast" class="mb-0"></ul></div>
              </div>
            </div>
            <div class="accordion-item">
              <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false">
                  <i class="fas fa-cloud-sun me-2 text-primary"></i>Lunch
                </button>
              </h2>
              <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#dietPlanAccordion">
                <div class="accordion-body"><ul id="resLunch" class="mb-0"></ul></div>
              </div>
            </div>
            <div class="accordion-item">
              <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree" aria-expanded="false">
                  <i class="fas fa-moon me-2 text-info"></i>Dinner
                </button>
              </h2>
              <div id="collapseThree" class="accordion-collapse collapse" data-bs-parent="#dietPlanAccordion">
                <div class="accordion-body"><ul id="resDinner" class="mb-0"></ul></div>
              </div>
            </div>
          </div>

          <div class="mt-3">
            <div id="coachMsg" class="alert alert-success py-2 px-3">You are doing great! Here’s a diet to maintain your current weight.</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="groceryModal" tabindex="-1" aria-labelledby="groceryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="groceryModalLabel"><i class="fa-solid fa-cart-shopping me-2"></i>Grocery List</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <ul id="groceryList" class="mb-0"></ul>
        </div>
        <div class="modal-footer">
          <button id="copyGroceryBtn" type="button" class="btn btn-outline-secondary"><i class="fa-regular fa-copy me-2"></i>Copy</button>
          <button id="downloadGroceryBtn" type="button" class="btn btn-primary"><i class="fa-solid fa-download me-2"></i>Download</button>
        </div>
      </div>
    </div>
  </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/results.js"></script>
</body>
</html>
